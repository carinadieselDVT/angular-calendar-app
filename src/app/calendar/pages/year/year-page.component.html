<div class="flex flex-col h-[85vh] min-h-0">
  <div class="flex gap-4 items-center justify-center pb-3">
    <p-button label="<<" size="small" (onClick)="prevYear()" />
    <p class="text-2xl text-center">
      {{ currentYear() }}
    </p>
    <p-button label=">>" size="small" (onClick)="nextYear()" />
  </div>

  <calendar-year-view
    class="block flex-1 min-h-0"
    [yearGrid]="yearGrid()"
    [holidayMap]="holidayMap()"
    (dayClick)="onDayClick($event)"
    (monthClick)="onMonthClick($event)"
  ></calendar-year-view>
</div>
