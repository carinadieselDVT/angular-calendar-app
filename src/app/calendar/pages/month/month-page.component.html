<div class="flex flex-col h-[85vh]">
  <div class="flex flex-col flex-1">
    <div class="text-3xl text-center mb-4">
      {{ currentDate() | date: 'MMMM yyyy' }}
    </div>

    <div class="grid grid-cols-7 gap-2 mb-2 text-center font-semibold text-gray-500">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>

    <calendar-month-view class="min-h-0" [month]="monthGrid()"></calendar-month-view>
  </div>
</div>
